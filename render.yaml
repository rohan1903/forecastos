# Render Blueprint — optional one-click deploy from repo root.
# Dashboard deploy works the same: Root Directory = backend, commands below.
services:
  - type: web
    name: forecastos-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    # Redeploy after API changes; verify GET /api/v1 returns status ok.
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        value: sqlite:///./forecastos.db
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
